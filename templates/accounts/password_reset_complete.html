{% extends 'base.html' %}

{% block title %}Password Reset Complete — StudySphere{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-5">
        <i class="bi bi-check-circle fs-1 text-success mb-3"></i>
        <h4 class="mb-2">Password reset complete</h4>
        <p class="text-muted">Your password has been set. You can now sign in with your new password.</p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
