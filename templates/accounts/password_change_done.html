{% extends 'base.html' %}

{% block title %}Password Changed — StudySphere{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-5">
        <i class="bi bi-check-circle fs-1 text-success mb-3"></i>
        <h4 class="mb-2">Password changed</h4>
        <p class="text-muted mb-0">Your password has been updated successfully.</p>
        <a href="{% url 'accounts:profile' user.username %}" class="btn btn-primary mt-3">Back to profile</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
