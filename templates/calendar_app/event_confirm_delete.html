{% extends 'base.html' %}

{% block title %}Delete Event — StudySphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-danger">
      <div class="card-body text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
        <h4>Delete "{{ event.title }}"?</h4>
        <p class="text-muted">
          This event on {{ event.start|date:"D, d M Y" }} will be permanently removed.
          This action cannot be undone.
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-2">
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-trash me-1"></i>Delete
            </button>
            <a href="{% url 'calendar_app:event_detail' event.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
